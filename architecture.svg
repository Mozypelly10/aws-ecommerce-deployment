<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Wonzystore AWS Architecture Diagram</title>
  <desc>Full AWS infrastructure for Wonzystore e-commerce platform in Asia Pacific Sydney region</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
      .label-main { font-size: 14px; font-weight: 600; fill: #1a1a2e; }
      .label-sub  { font-size: 12px; font-weight: 400; fill: #444; }
      .label-sub2 { font-size: 11px; font-weight: 400; fill: #666; }
      .arr { stroke: #888; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
      .arr-dashed { stroke: #aaa; stroke-width: 1; stroke-dasharray: 4 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="820" fill="#f8f9fa"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="680" height="42" fill="#1a1a2e"/>
  <text x="340" y="26" text-anchor="middle" font-family="Arial" font-size="15" font-weight="700" fill="#ffffff">Wonzystore — AWS E-Commerce Architecture</text>
  <text x="340" y="38" text-anchor="middle" font-family="Arial" font-size="10" fill="#aaaacc">Asia Pacific (Sydney) · ap-southeast-2 · Phase 1 Complete</text>

  <!-- AWS Region container -->
  <rect x="20" y="120" width="640" height="650" rx="14" fill="#fffdf7" stroke="#FF9900" stroke-width="1.5" stroke-dasharray="8 4"/>
  <rect x="30" y="113" width="200" height="18" fill="#f8f9fa"/>
  <text x="38" y="126" font-family="Arial" font-size="11" font-weight="600" fill="#FF9900">AWS Region: ap-southeast-2 (Sydney)</text>

  <!-- VPC container -->
  <rect x="38" y="148" width="604" height="608" rx="10" fill="none" stroke="#3B8BD4" stroke-width="1" stroke-dasharray="5 3"/>
  <rect x="46" y="142" width="160" height="16" fill="#f8f9fa"/>
  <text x="52" y="154" font-family="Arial" font-size="10" fill="#3B8BD4" font-weight="600">VPC — 172.31.0.0/16</text>

  <!-- INTERNET USERS -->
  <rect x="215" y="52" width="250" height="54" rx="10" fill="#dbeafe" stroke="#3B8BD4" stroke-width="1.2"/>
  <text x="340" y="73" text-anchor="middle" class="label-main" fill="#1e3a5f">🌐  Australian users</text>
  <text x="340" y="91" text-anchor="middle" class="label-sub" fill="#2563eb">Browsers · mobile · web traffic</text>

  <!-- Arrow: users → CloudFront -->
  <line x1="340" y1="106" x2="340" y2="165" class="arr" stroke="#3B8BD4"/>
  <rect x="305" y="130" width="72" height="16" fill="#f8f9fa"/>
  <text x="341" y="142" text-anchor="middle" class="label-sub2">HTTPS request</text>

  <!-- CLOUDFRONT -->
  <rect x="185" y="168" width="310" height="58" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.2"/>
  <text x="340" y="190" text-anchor="middle" class="label-main" fill="#064e3b">☁  CloudFront CDN</text>
  <text x="340" y="208" text-anchor="middle" class="label-sub" fill="#047857">Global edge delivery · HTTPS termination · Caching</text>

  <!-- Arrow: CloudFront → WAF -->
  <line x1="340" y1="226" x2="340" y2="264" class="arr" stroke="#059669"/>

  <!-- WAF -->
  <rect x="185" y="266" width="310" height="58" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="340" y="288" text-anchor="middle" class="label-main" fill="#7f1d1d">🛡  AWS WAF</text>
  <text x="340" y="306" text-anchor="middle" class="label-sub" fill="#b91c1c">Geo-block African IPs · Rate limiting · OWASP rules</text>

  <!-- Blocked traffic -->
  <line x1="185" y1="295" x2="110" y2="295" class="arr" stroke="#dc2626"/>
  <rect x="28" y="272" width="82" height="46" rx="8" fill="#fca5a5" stroke="#dc2626" stroke-width="1"/>
  <text x="69" y="290" text-anchor="middle" class="label-sub" fill="#7f1d1d" font-weight="600">BLOCKED</text>
  <text x="69" y="308" text-anchor="middle" class="label-sub2" fill="#7f1d1d">African IPs</text>

  <!-- Arrow: WAF → Security Group -->
  <line x1="340" y1="324" x2="340" y2="358" class="arr" stroke="#dc2626"/>
  <rect x="290" y="334" width="100" height="16" fill="#f8f9fa"/>
  <text x="340" y="346" text-anchor="middle" class="label-sub2">Clean traffic only</text>

  <!-- SECURITY GROUP container -->
  <rect x="58" y="360" width="564" height="300" rx="10" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="68" y="354" width="210" height="16" fill="#f8f9fa"/>
  <text x="76" y="366" font-family="Arial" font-size="10" fill="#10b981" font-weight="600">Security group: wonzystore-sg</text>

  <!-- Port rules -->
  <rect x="140" y="372" width="400" height="22" rx="5" fill="#ecfdf5" stroke="#10b981" stroke-width="0.8"/>
  <text x="340" y="387" text-anchor="middle" class="label-sub2" fill="#065f46">Port 22 SSH (admin IP only)  ·  Port 80 HTTP (anywhere)  ·  Port 443 HTTPS (anywhere)</text>

  <!-- Arrow: SG → EC2 -->
  <line x1="340" y1="394" x2="340" y2="420" class="arr" stroke="#10b981"/>

  <!-- EC2 INSTANCE -->
  <rect x="160" y="422" width="360" height="84" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="340" y="445" text-anchor="middle" class="label-main" fill="#3b0764">⚡  EC2 — i-0f4706a0d42cb33f7</text>
  <text x="340" y="463" text-anchor="middle" class="label-sub" fill="#5b21b6">Ubuntu 24.04 LTS · Nginx web server · UFW firewall</text>
  <text x="340" y="479" text-anchor="middle" class="label-sub2" fill="#6d28d9">t2.micro · 20 GiB gp3 · Public IP: 3.107.29.242</text>
  <text x="340" y="496" text-anchor="middle" class="label-sub2" fill="#7c3aed">SSH key: wonzystore-keypair.pem · Auto-start enabled</text>

  <!-- Arrow EC2 → RDS -->
  <line x1="255" y1="506" x2="180" y2="560" class="arr" stroke="#7c3aed"/>

  <!-- Arrow EC2 → S3 -->
  <line x1="425" y1="506" x2="500" y2="560" class="arr" stroke="#7c3aed"/>

  <!-- RDS DATABASE -->
  <rect x="68" y="562" width="224" height="68" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="180" y="584" text-anchor="middle" class="label-main" fill="#713f12">🗄  RDS Database</text>
  <text x="180" y="602" text-anchor="middle" class="label-sub" fill="#92400e">MySQL / PostgreSQL</text>
  <text x="180" y="618" text-anchor="middle" class="label-sub2" fill="#a16207">db.t3.micro · Private subnet · Pending setup</text>

  <!-- S3 BUCKET -->
  <rect x="428" y="562" width="186" height="68" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="521" y="584" text-anchor="middle" class="label-main" fill="#14532d">🪣  S3 Bucket</text>
  <text x="521" y="602" text-anchor="middle" class="label-sub" fill="#166534">Product images</text>
  <text x="521" y="618" text-anchor="middle" class="label-sub2" fill="#15803d">Static assets · Pending setup</text>

  <!-- IAM -->
  <rect x="68" y="658" width="224" height="60" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.2"/>
  <text x="180" y="678" text-anchor="middle" class="label-main" fill="#1e293b">🔐  IAM — wonzystore-admin</text>
  <text x="180" y="696" text-anchor="middle" class="label-sub" fill="#475569">MFA enabled · AdministratorAccess</text>
  <text x="180" y="712" text-anchor="middle" class="label-sub2" fill="#64748b">Root account isolated · Alias: wonzystore</text>

  <!-- ROUTE 53 -->
  <rect x="428" y="658" width="186" height="60" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
  <text x="521" y="678" text-anchor="middle" class="label-main" fill="#14532d">🌍  Route 53</text>
  <text x="521" y="696" text-anchor="middle" class="label-sub" fill="#166534">DNS management</text>
  <text x="521" y="712" text-anchor="middle" class="label-sub2" fill="#15803d">Domain routing · Pending setup</text>

  <!-- SSH admin dashed arrow -->
  <path d="M180 658 Q 180 580 260 506" class="arr-dashed" stroke="#64748b"/>
  <text x="128" y="590" class="label-sub2" fill="#64748b">SSH admin</text>
  <text x="128" y="602" class="label-sub2" fill="#64748b">access</text>

  <!-- Legend -->
  <rect x="20" y="778" width="640" height="34" rx="8" fill="#1a1a2e"/>
  <text x="340" y="791" text-anchor="middle" font-family="Arial" font-size="10" fill="#aaaacc">■ Phase 1 Complete (EC2, Nginx, UFW, IAM, Security Group, WAF planned)</text>
  <text x="340" y="806" text-anchor="middle" font-family="Arial" font-size="10" fill="#666699">■ Phase 2 Pending (RDS, S3, CloudFront, Route 53, WAF, SSL, App Deployment)</text>
</svg>
